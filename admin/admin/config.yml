backend:
  name: git-gateway
  branch: main

media_folder: "uploads"
public_folder: "/uploads"

locale: "uz"

collections:
  - name: "articles"
    label: "Maqolalar"
    folder: "articles"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Maqola nomi", name: "title", widget: "string" }
      - { label: "Muallif", name: "author", widget: "string" }
      - { label: "Sana", name: "date", widget: "datetime" }
      - { label: "Annotatsiya", name: "abstract", widget: "text" }
      - { label: "Kalit so‘zlar", name: "keywords", widget: "list", required: false }
      - { label: "PDF fayl", name: "pdf", widget: "file", required: false }
      - { label: "Matn", name: "body", widget: "markdown", required: false }
